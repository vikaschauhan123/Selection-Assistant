<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Selection Assistant Settings</title>
  <style>
    body {
      margin: 0;
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1c1f26;
      color: #e7e9ee;
    }

    .container {
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 14px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #a7acb8;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 90%;
      background: #2a2e37;
      border: 1px solid #3a3f4b;
      border-radius: 6px;
      color: #e7e9ee;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 4px;
    }

    input:focus {
      outline: none;
      border-color: #2f6feb;
    }

    .lang-picker {
      position: relative;
    }

    .lang-list {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #3a3f4b;
      border-radius: 6px;
      margin-top: 4px;
      max-height: 300px;
      overflow-y: auto;
      overflow-x: hidden;
      display: none;
    }

    .lang-list.open {
      display: block;
    }

    .lang-item {
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
      color: #e7e9ee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lang-item:hover,
    .lang-item.active {
      background: #2f6feb;
      color: #ffffff;
    }

    .lang-item .lang-code {
      color: #a7acb8;
      font-size: 11px;
      margin-left: 6px;
    }

    .lang-item:hover .lang-code,
    .lang-item.active .lang-code {
      color: #dbe6ff;
    }

    .lang-empty {
      padding: 8px 10px;
      font-size: 12px;
      color: #a7acb8;
    }

    .field {
      margin-bottom: 14px;
    }

    .hint {
      font-size: 11.5px;
      color: #8ecb8e;
      min-height: 14px;
    }

    .hint.error {
      color: #f08a80;
    }

    button {
      width: 100%;
      background: #2f6feb;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #4a83f0;
    }

    .status {
      text-align: center;
      font-size: 11.5px;
      color: #8ecb8e;
      margin-top: 10px;
      min-height: 14px;
    }

    .guide-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #2a2e37;
      font-size: 12px;
      color: #a7acb8;
      text-decoration: none;
    }

    .guide-link:hover {
      color: #ffffff;
    }

    .toggle-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-field-text {
      display: block;
      font-size: 13px;
      color: #e7e9ee;
      margin-bottom: 0;
    }

    .toggle-switch-wrap {
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
    }

    .toggle-switch-wrap input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: pointer;
    }

    .toggle-switch {
      position: relative;
      display: block;
      width: 36px;
      height: 20px;
      background: #3a3f4b;
      border-radius: 999px;
      transition: background 0.15s ease;
    }

    .toggle-switch::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #ffffff;
      border-radius: 50%;
      transition: transform 0.15s ease;
    }

    .toggle-switch-wrap input:checked ~ .toggle-switch {
      background: #2f6feb;
    }

    .toggle-switch-wrap input:checked ~ .toggle-switch::before {
      transform: translateX(16px);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Selection Assistant</h1>

    <div class="field toggle-field">
      <span class="toggle-field-text">Enable toolbar on selection</span>
      <label class="toggle-switch-wrap">
        <input type="checkbox" id="enabledToggle" checked />
        <span class="toggle-switch"></span>
      </label>
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-... or sk-ant-..." autocomplete="off" />
      <div id="providerHint" class="hint"></div>
    </div>

    <div class="field lang-picker">
      <label for="langSearch">Target language (for Translate)</label>
      <input type="text" id="langSearch" placeholder="Search language..." autocomplete="off" />
      <div id="langList" class="lang-list"></div>
      <input type="hidden" id="targetLang" value="en" />
    </div>

    <button id="saveBtn">Save</button>
    <div id="status" class="status"></div>

    <a id="guideLink" class="guide-link" href="guide.html" target="_blank" rel="noopener noreferrer">📖 User Guide</a>
  </div>
  <script src="popup.js"></script>
</body>

</html>
